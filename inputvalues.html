<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>jqueries</title>
        <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
        <script>
            $(function() {
                $.each($('.interesses:checked'), (indice, valor) => {
                    console.log(indice, valor);
                    }
                );
        </script>
    </head>
    <body>

        <label style="margin-left: 10px;" for="nome">Nome:</label>
        <input type="text" id="nome">
        <br/>

        <label for="onde-encontrou" style="margin-left: 10px;">Onde nos encontrou?</label>

        <select id="onde-encontrou">
            <option value="0">Google</option>
            <option value="1">Facebook</option>
            <option value="2">Instagram</option>
            <option value="3">Outro</option>
        </select>
        <br/>

        <label for="sexo" style="margin-left: 10px;">Sexo:</label><br/>
        <input type="radio" name="sexo" value="m" class="sexo">Masculino<br/>
        <input type="radio" name="sexo" value="f" class="sexo">Feminino<br/>
        <input type="radio" name="sexo" value="o" class="sexo">Outro<br/>
        <br/>

        <label for="interesses" style="margin-left: 10px;">Interesses:</label>
        <br/>
        <input type="checkbox" name="interesses" value="0" class="interesses">Programação<br/>
        <input type="checkbox" name="interesses" value="1" class="interesses">Design<br/>
        <input type="checkbox" name="interesses" value="2" class="interesses">Marketing<br/>

        
    </body>
</html>
