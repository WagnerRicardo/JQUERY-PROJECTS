<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<title>jQuery</title>

		<style>

			.focused {
				border: 2px solid blue;
				background-color: lightblue;
				color: black;
				box-sizing: border-box;
				box-shadow: 0 0 5px rgba(0, 0, 255, 0.5);
			}

            .caixas {
                width: 200px;
                height: 100px;
                background-color: lightgray;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
                margin-top: 20px;
            }

            .hovering {
                background-color: rgb(253, 55, 55);
                color: white;
            }
		</style>

		<script src="https://code.jquery.com/jquery-3.3.1.min.js" integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8=" crossorigin="anonymous"></script>
		<script>
			$(document).ready( () => {
                $('#btn1').on('click', () => {
                    $('#input1').focus();
                });

                $('body').on('focus', 'input', (event) => {
                    $(event.target).toggleClass('focused');
                });
                $('body').on('blur', 'input', (event) => {
                    $(event.target).toggleClass('focused');
                });

                $('#caixa').hover(
                    () => {
                        $('#caixa').addClass('hovering');
                    },
                    () => {
                        $('#caixa').removeClass('hovering');
                    }
                );
            })
		</script>
	</head>

	<body>

        <button type="button" id="btn1">btn!</button>
		
        <input type="text" id="input1" placeholder="Digite algo...">

        <div id="caixa" class="caixas">CAIXA</div>

	</body>

</html>
